name: Dropbox sync

on:
  workflow_dispatch:        # manual "Run sync" button
  schedule:
    - cron: "23 * * * *"    # hourly (acts as a backstop even with a webhook)

permissions:
  contents: write

concurrency:
  group: dropbox-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install thumbnail tools (ffmpeg + poppler + ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg poppler-utils imagemagick ghostscript librsvg2-bin
          # Ubuntu ships ImageMagick with PDF/AI/EPS reading disabled by policy;
          # re-enable read so white AI/PDF logos can be composited onto gray.
          sudo sed -i -E 's/rights="none" pattern="(PDF|EPS|PS|AI)"/rights="read|write" pattern="\1"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Sync from Dropbox
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: node scripts/dropbox-sync.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "dropbox-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Bump the synced.js cache token so GitHub Pages serves the fresh file.
          node -e "const fs=require('fs');let h=fs.readFileSync('index.html','utf8');h=h.replace(/synced\.js\?v=[0-9a-z]+/,'synced.js?v='+Date.now());fs.writeFileSync('index.html',h)"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes from Dropbox."
          else
            git commit -m "Dropbox sync: refresh assets [skip ci]"
            # Rebase onto any commits that landed while we were syncing (manual
            # pushes or an overlapping run) and retry, so the push can't lose a
            # race and fail the job.
            for i in 1 2 3 4 5; do
              if git push; then echo "pushed"; break; fi
              echo "push rejected (attempt $i) — rebasing and retrying"
              git pull --rebase --autostash origin main || true
              sleep 5
            done
          fi
